<!DOCTYPE html>
<html>
<head>

<title>FroxenMC Hosting</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:6px;
margin:3px;
background:#009933;
color:white;
border:none;
cursor:pointer;
}

.panel{
display:none;
}

.server{
border:1px solid white;
margin:10px;
padding:10px;
}

</style>

</head>

<body>

<h1>FroxenMC Hosting</h1>


<div id="login">

<h2>Login</h2>

<input id="user" placeholder="Username">

<br><br>

<button onclick="login()">Login</button>

</div>



<div id="dashboard" class="panel">

<h2>Dashboard</h2>

<button onclick="showCreate()">Create Server</button>
<button onclick="logout()">Logout</button>

<h3 id="welcome"></h3>

<div id="servers"></div>

</div>



<div id="create" class="panel">

<h2>Create Server</h2>

Name:
<br>
<input id="sname">

<br><br>

RAM:
<br>

<select id="ram">
<option>1GB</option>
<option>2GB</option>
<option>4GB</option>
<option>8GB</option>
</select>

<br><br>

Version:
<br>

<select id="ver">
<option>Paper</option>
<option>Spigot</option>
<option>Vanilla</option>
<option>Forge</option>
</select>

<br><br>

<button onclick="createServer()">Create</button>
<button onclick="back()">Back</button>

</div>



<script>

let servers = [];

let username = "";


function login(){

username = document.getElementById("user").value;

if(username=="") return;

document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";

document.getElementById("welcome").innerHTML =
"Welcome " + username;

}



function logout(){

document.getElementById("dashboard").style.display="none";

document.getElementById("login").style.display="block";

}



function showCreate(){

document.getElementById("dashboard").style.display="none";

document.getElementById("create").style.display="block";

}



function back(){

document.getElementById("create").style.display="none";

document.getElementById("dashboard").style.display="block";

}



function createServer(){

let name =
document.getElementById("sname").value;

let ram =
document.getElementById("ram").value;

let ver =
document.getElementById("ver").value;

if(name=="") return;

servers.push({
name:name,
ram:ram,
ver:ver,
status:"Stopped"
});

updateServers();

back();

}



function start(i){

servers[i].status = "Running";

updateServers();

}



function stop(i){

servers[i].status = "Stopped";

updateServers();

}



function deleteServer(i){

servers.splice(i,1);

updateServers();

}



function updateServers(){

let list = "";

for(let i=0;i<servers.length;i++){

let s = servers[i];

list +=
"<div class='server'>"
+
"<b>"+s.name+"</b><br>"
+
"RAM: "+s.ram+"<br>"
+
"Type: "+s.ver+"<br>"
+
"Status: "+s.status+"<br><br>"
+
"<button onclick='start("+i+")'>Start</button>"
+
"<button onclick='stop("+i+")'>Stop</button>"
+
"<button onclick='deleteServer("+i+")'>Delete</button>"
+
"</div>";

}

document.getElementById("servers").innerHTML = list;

}


</script>


</body>
</html>
