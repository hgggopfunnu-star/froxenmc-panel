<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FroxenMC Panel</title>


<style>

/* ---------- BODY ---------- */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}


/* ---------- LOGIN ---------- */

#login {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
}


/* ---------- SIDEBAR ---------- */

#side {
    display: none;
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100vh;
    background: #111827;
    padding: 20px;
}

#side button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    background: #1f2937;
    color: white;
    cursor: pointer;
}

#side button:hover {
    background: #374151;
}


/* ---------- MAIN ---------- */

#main {
    display: none;
    margin-left: 240px;
    padding: 20px;
}


/* ---------- PAGES ---------- */

.page {
    display: none;
}

#dashboard {
    display: block;
}


/* ---------- CARD ---------- */

.card {
    background: #1f2937;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}


/* ---------- SERVER ---------- */

.server {
    background: #111827;
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
}

.server button {
    padding: 6px 10px;
    margin-right: 5px;
    border: none;
    background: #374151;
    color: white;
    cursor: pointer;
}

.server button:hover {
    background: #4b5563;
}


/* ---------- INPUT ---------- */

input {
    width: 200px;
    padding: 6px;
    border: none;
    border-radius: 4px;
    margin-top: 4px;
}

</style>

</head>


<body>



<!-- ================= LOGIN ================= -->

<div id="login">

    <div class="card">

        <h2>FroxenMC Panel Login</h2>

        <div
            id="g_id_onload"
            data-client_id="265090568809-5rrmcfev60sqs3qmke5ot09e877ucgud.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"></div>

    </div>

</div>



<!-- ================= SIDEBAR ================= -->

<div id="side">

    <h3>Panel</h3>

    <button onclick="page('dashboard')">Dashboard</button>
    <button onclick="page('create')">Create Server</button>
    <button onclick="page('account')">Account</button>

</div>



<!-- ================= MAIN ================= -->

<div id="main">



    <!-- ===== DASHBOARD ===== -->

    <div id="dashboard" class="page">

        <div class="card">
            <h2>Dashboard</h2>
            <p id="status">Checking backend...</p>
        </div>


        <div class="card">

            <h2>Your Servers</h2>

            <div class="server">
                <h3>Example Server</h3>
                <p>Status: Offline</p>
                <button>Start</button>
                <button>Stop</button>
            </div>

        </div>

    </div>



    <!-- ===== CREATE ===== -->

    <div id="create" class="page">

        <div class="card">

            <h2>Create Server</h2>

            <label>Name</label><br>
            <input id="srvName"><br><br>

            <label>RAM</label><br>
            <input id="srvRam" value="1024"><br><br>

            <label>Version</label><br>
            <input id="srvVersion" value="1.20.1"><br><br>

            <button onclick="createServer()">
                Create Server
            </button>

            <p id="createStatus"></p>

        </div>

    </div>



    <!-- ===== ACCOUNT ===== -->

    <div id="account" class="page">

        <div class="card">
            <h2>Account</h2>
            <p>User info later</p>
        </div>

    </div>



</div>



<!-- ================= SCRIPT ================= -->

<script>


function handleCredentialResponse(response) {

    document.getElementById("login").style.display = "none";
    document.getElementById("side").style.display = "block";
    document.getElementById("main").style.display = "block";

    checkBackend();

}



function page(p) {

    const pages = ["dashboard", "create", "account"];

    pages.forEach(id => {
        document.getElementById(id).style.display = "none";
    });

    document.getElementById(p).style.display = "block";

}



function checkBackend() {

    const status = document.getElementById("status");

    status.innerText = "Checking backend...";

    fetch(
        "https://froxenmc-backend-production.up.railway.app/api/test"
    )
    .then(r => r.json())
    .then(data => {

        status.innerText =
            "Backend: " + data.status;

    })
    .catch(() => {

        status.innerText =
            "Backend offline";

    });

}



function createServer() {

    const name =
        document.getElementById("srvName").value;

    const ram =
        document.getElementById("srvRam").value;

    const version =
        document.getElementById("srvVersion").value;

    const status =
        document.getElementById("createStatus");


    status.innerText = "Creating...";


    fetch(
        "https://froxenmc-backend-production.up.railway.app/api/create",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                ram,
                version
            })
        }
    )
    .then(r => r.json())
    .then(data => {

        status.innerText =
            data.message;

    })
    .catch(() => {

        status.innerText =
            "Error";

    });

}


</script>



<script src="https://accounts.google.com/gsi/client" async defer></script>


</body>
</html>
