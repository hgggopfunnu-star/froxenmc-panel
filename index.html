<!DOCTYPE html>
<html>
<head>
<title>FroxenMC Hosting</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:10px;
margin:5px;
background:#00aa00;
color:white;
border:none;
cursor:pointer;
}

.panel{
display:none;
}

.server{
border:1px solid white;
margin:5px;
padding:5px;
}
</style>

</head>

<body>

<h1>FroxenMC Hosting</h1>

<div id="login">

<h2>Login</h2>

<input id="user" placeholder="Username">
<br><br>

<button onclick="login()">Login</button>

</div>


<div id="dashboard" class="panel">

<h2>Dashboard</h2>

<button onclick="showCreate()">Create Server</button>
<button onclick="logout()">Logout</button>

<h3>Your Servers</h3>

<div id="servers"></div>

</div>


<div id="create" class="panel">

<h2>Create Server</h2>

<input id="sname" placeholder="Server name">
<br><br>

<button onclick="createServer()">Create</button>
<button onclick="back()">Back</button>

</div>


<script>

let servers = [];

function login(){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
}

function logout(){
document.getElementById("dashboard").style.display="none";
document.getElementById("login").style.display="block";
}

function showCreate(){
document.getElementById("dashboard").style.display="none";
document.getElementById("create").style.display="block";
}

function back(){
document.getElementById("create").style.display="none";
document.getElementById("dashboard").style.display="block";
}

function createServer(){

let name = document.getElementById("sname").value;

if(name=="") return;

servers.push(name);

updateServers();

back();

}

function deleteServer(i){

servers.splice(i,1);

updateServers();

}

function updateServers(){

let list = "";

for(let i=0;i<servers.length;i++){

list += "<div class='server'>"
+ servers[i] +
" <button onclick='deleteServer("+i+")'>Delete</button>"
+ "</div>";

}

document.getElementById("servers").innerHTML = list;

}

</script>

</body>
</html>
